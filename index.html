<script>document.write("\u003c\u0021\u0064\u006f\u0063\u0074\u0079\u0070\u0065\u0020\u0068\u0074\u006d\u006c\u003e\u000a\u003c\u0068\u0074\u006d\u006c\u0020\u006c\u0061\u006e\u0067\u003d\u0022\u0065\u006e\u0022\u003e\u000a\u003c\u0068\u0065\u0061\u0064\u003e\u000a\u0020\u0020\u003c\u006d\u0065\u0074\u0061\u0020\u0063\u0068\u0061\u0072\u0073\u0065\u0074\u003d\u0022\u0075\u0074\u0066\u002d\u0038\u0022\u003e\u000a\u0020\u0020\u003c\u006d\u0065\u0074\u0061\u0020\u006e\u0061\u006d\u0065\u003d\u0022\u0076\u0069\u0065\u0077\u0070\u006f\u0072\u0074\u0022\u0020\u0063\u006f\u006e\u0074\u0065\u006e\u0074\u003d\u0022\u0077\u0069\u0064\u0074\u0068\u003d\u0064\u0065\u0076\u0069\u0063\u0065\u002d\u0077\u0069\u0064\u0074\u0068\u002c\u0020\u0069\u006e\u0069\u0074\u0069\u0061\u006c\u002d\u0073\u0063\u0061\u006c\u0065\u003d\u0031\u0022\u003e\u000a\u0020\u0020\u003c\u0074\u0069\u0074\u006c\u0065\u003e\u004d\u006f\u0076\u0069\u0065\u0078\u003c\u002f\u0074\u0069\u0074\u006c\u0065\u003e\u000a\u0020\u0020\u003c\u006c\u0069\u006e\u006b\u0020\u0072\u0065\u006c\u003d\u0022\u0073\u0074\u0079\u006c\u0065\u0073\u0068\u0065\u0065\u0074\u0022\u0020\u0068\u0072\u0065\u0066\u003d\u0022\u0068\u0074\u0074\u0070\u0073\u003a\u002f\u002f\u0063\u0064\u006e\u006a\u0073\u002e\u0063\u006c\u006f\u0075\u0064\u0066\u006c\u0061\u0072\u0065\u002e\u0063\u006f\u006d\u002f\u0061\u006a\u0061\u0078\u002f\u006c\u0069\u0062\u0073\u002f\u0066\u006f\u006e\u0074\u002d\u0061\u0077\u0065\u0073\u006f\u006d\u0065\u002f\u0036\u002e\u0035\u002e\u0032\u002f\u0063\u0073\u0073\u002f\u0061\u006c\u006c\u002e\u006d\u0069\u006e\u002e\u0063\u0073\u0073\u0022\u003e\u000a\u0020\u0020\u003c\u0073\u0074\u0079\u006c\u0065\u003e\u000a\u0020\u0020\u0020\u0020\u003a\u0072\u006f\u006f\u0074\u0020\u007b\u000a\u0020\u0020\u0020\u0020\u0020\u0020\u0063\u006f\u006c\u006f\u0072\u002d\u0073\u0063\u0068\u0065\u006d\u0065\u003a\u0020\u0064\u0061\u0072\u006b\u003b\u000a\u0020\u0020\u0020\u0020\u0020\u0020\u002d\u002d\u0062\u0067\u003a\u0020\u0023\u0030\u
