<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Moviex</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
  <style>
    :root {
      color-scheme: dark;
      --bg: #0f1117;
      --surface: #171b24;
      --surface-2: #202634;
      --text: #ffffff;
      --muted: #ffffff;
      --line: #303848;
      --accent: #a855f7;
      --danger: #ff637a;
      --shadow: 0 18px 48px rgba(0, 0, 0, .34);
      --squircle: 22px;
      --squircle-sm: 16px;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
      background:
        radial-gradient(circle at 18% 4%, rgba(168, 85, 247, .18), transparent 25rem),
        radial-gradient(circle at 82% 0%, rgba(89, 129, 255, .12), transparent 24rem),
        linear-gradient(135deg, #0f1117 0%, #141821 52%, #101218 100%);
      color: var(--text);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      letter-spacing: 0;
    }

    body {
      min-height: 100vh;
    }

    button,
    input {
      font: inherit;
    }

    button {
      cursor: pointer;
    }

    .app {
      width: min(1220px, calc(100% - 32px));
      margin: 0 auto;
      padding: 30px 0 44px;
    }

    h1,
    h2 {
      margin: 0;
      line-height: 1;
    }

    h1 {
      font-size: clamp(1.8rem, 5vw, 4.4rem);
      letter-spacing: 0;
    }

    h2 {
      font-size: clamp(1.15rem, 2vw, 1.45rem);
    }

    .tagline {
      margin: 10px 0 0;
      color: var(--muted);
      font-size: 1rem;
    }

    .search-row {
      display: grid;
      grid-template-columns: auto minmax(0, 780px) auto;
      gap: 14px;
      align-items: center;
      margin: 0 auto 34px;
    }

    .search-form {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 10px;
      width: 100%;
      padding: 8px;
      border: 1px solid var(--line);
      border-radius: var(--squircle);
      background: rgba(23, 27, 36, .92);
      box-shadow: var(--shadow);
      backdrop-filter: blur(14px);
    }

    .search-logo {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 92px;
      height: 46px;
      border: 1px solid rgba(168, 85, 247, .58);
      border-radius: var(--squircle-sm);
      background: rgba(168, 85, 247, .16);
      color: var(--text);
      font-weight: 900;
      text-decoration: none;
    }

    .search-input {
      width: 100%;
      min-width: 0;
      height: 46px;
      border: 0;
      border-radius: var(--squircle-sm);
      outline: none;
      background: #10141c;
      color: var(--text);
      padding: 0 14px;
    }

    .search-input:focus {
      box-shadow: 0 0 0 2px rgba(168, 85, 247, .48);
    }

    .primary-btn,
    .icon-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      border: 1px solid rgba(168, 85, 247, .58);
      border-radius: var(--squircle-sm);
      background: rgba(168, 85, 247, .16);
      color: var(--text);
      font-weight: 850;
      transition: transform .15s ease, background .15s ease;
    }

    .primary-btn {
      min-width: 112px;
      height: 46px;
      padding: 0 18px;
    }

    .icon-btn {
      min-width: 84px;
      height: 36px;
      padding: 0 12px;
    }

    .player-actions {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .player-selector {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      max-width: 100%;
      padding: 5px;
      border: 1px solid var(--line);
      border-radius: var(--squircle-sm);
      background: rgba(16, 20, 28, .78);
    }

    .player-option {
      height: 30px;
      border: 0;
      border-radius: 11px;
      background: transparent;
      color: var(--text);
      padding: 0 10px;
      font-size: .84rem;
      font-weight: 820;
      white-space: nowrap;
      transition: background .15s ease, color .15s ease;
    }

    .player-option:hover,
    .player-option:focus-visible {
      background: rgba(168, 85, 247, .18);
      outline: none;
    }

    .player-option.active {
      background: rgba(168, 85, 247, .88);
      color: #fff;
    }

    .primary-btn:hover,
    .icon-btn:hover {
      background: rgba(168, 85, 247, .28);
      transform: translateY(-1px);
    }

    .primary-btn:disabled {
      cursor: wait;
      opacity: .72;
      transform: none;
    }

    .section-head {
      margin: 0 0 14px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(154px, 1fr));
      gap: 14px;
    }

    .movie-card {
      display: grid;
      grid-template-rows: auto 1fr;
      gap: 9px;
      width: 100%;
      min-width: 0;
      border: 1px solid var(--line);
      border-radius: var(--squircle);
      background: rgba(23, 27, 36, .9);
      color: inherit;
      padding: 9px;
      text-align: left;
      box-shadow: 0 10px 28px rgba(0, 0, 0, .18);
      transition: border-color .15s ease, background .15s ease, transform .15s ease;
    }

    .movie-card:hover,
    .movie-card:focus-visible {
      border-color: rgba(168, 85, 247, .78);
      background: #1c2330;
      transform: translateY(-2px);
      outline: none;
    }

    .poster {
      width: 100%;
      aspect-ratio: 2 / 3;
      border-radius: var(--squircle-sm);
      background: linear-gradient(145deg, #263140, #11151d);
      object-fit: cover;
      overflow: hidden;
    }

    .poster-fallback {
      display: grid;
      place-items: center;
      color: var(--muted);
      font-size: 2.2rem;
      font-weight: 900;
    }

    .movie-title {
      margin: 0 0 8px;
      overflow-wrap: anywhere;
      font-size: .96rem;
      font-weight: 820;
      line-height: 1.2;
    }

    .player-view {
      display: none;
    }

    .player-view.show {
      display: block;
    }

    .player-shell {
      overflow: hidden;
      border: 1px solid var(--line);
      border-radius: var(--squircle);
      background: rgba(23, 27, 36, .92);
      box-shadow: var(--shadow);
    }

    .player-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      min-height: 64px;
      padding: 14px 16px;
      border-bottom: 1px solid var(--line);
      background: rgba(32, 38, 52, .72);
    }

    .player-title {
      margin: 0;
      overflow-wrap: anywhere;
      font-size: 1.05rem;
      line-height: 1.25;
    }

    .player-meta {
      margin: 5px 0 0;
      color: var(--muted);
      font-size: .9rem;
    }

    .frame-wrap {
      width: 100%;
      aspect-ratio: 16 / 9;
      min-height: 320px;
      background: #05070a;
    }

    iframe {
      display: block;
      width: 100%;
      height: 100%;
      border: 0;
      background: #05070a;
    }

    .home-view.hidden {
      display: none;
    }

    @media (max-width: 700px) {
      .app {
        width: min(100% - 20px, 1220px);
        padding-top: 16px;
      }

      .player-head {
        align-items: stretch;
        flex-direction: column;
      }

      .player-actions {
        justify-content: stretch;
      }

      .player-selector,
      .icon-btn {
        width: 100%;
      }

      .player-option {
        flex: 1;
        min-width: 0;
        padding: 0 8px;
      }

      .search-row {
        grid-template-columns: 1fr;
      }

      .search-logo {
        width: 100%;
      }

      .search-form {
        grid-template-columns: 1fr;
      }

      .primary-btn {
        width: 100%;
      }

      .grid {
        grid-template-columns: repeat(auto-fill, minmax(132px, 1fr));
        gap: 10px;
      }

      .frame-wrap {
        min-height: 230px;
      }
    }
  </style>
</head>
<body>
  <main class="app">
    <section class="player-view" id="playerView" aria-label="Movie player">
      <div class="player-shell">
        <div class="player-head">
          <div>
            <h2 class="player-title" id="playerTitle">Moviex Player</h2>
            <p class="player-meta" id="playerMeta"></p>
          </div>
          <div class="player-actions">
            <div class="player-selector" id="playerSelector" aria-label="Choose player"></div>
            <button class="icon-btn" id="backHome" type="button" aria-label="Home">
              <i class="fa-solid fa-house" aria-hidden="true"></i>
              <span>Home</span>
            </button>
          </div>
        </div>
        <div class="frame-wrap">
          <iframe id="player" title="Moviex player" referrerpolicy="origin" allow="autoplay; fullscreen; picture-in-picture" allowfullscreen></iframe>
        </div>
      </div>
    </section>

    <section class="home-view" id="homeView">
      <div class="search-row">
        <button class="search-logo" id="homeLogo" type="button" aria-label="Open homepage">Moviex</button>
        <form class="search-form" id="searchForm">
          <input class="search-input" id="searchInput" type="search" autocomplete="off" placeholder="Search movies..." aria-label="Search movies">
          <button class="primary-btn" id="searchButton" type="submit">
            <i class="fa-solid fa-magnifying-glass" aria-hidden="true"></i>
            <span>Search</span>
          </button>
        </form>
      </div>

      <section aria-label="Search results">
        <div class="section-head">
          <h2 id="sectionTitle">Recommended Movies</h2>
        </div>
        <div class="grid" id="movieGrid" aria-live="polite"></div>
      </section>
    </section>
  </main>

    const API_URL = "https://tmdb-search.athyx-network.workers.dev/?q=";
    const PLAYER_PARAMS = "colour=a855f7&autoplay=true&autonextepisode=true&pausescreen=true";
    const DEFAULT_PLAYER = "vidsrc-su";
    const PLAYERS = [
      {
        id: "vidsrc-su",
        label: "VidSrc.su",
        url: ({ mediaType, tmdbId, season, episode }) => {
          if (mediaType === "tv") {
            return `https://vidsrc.su/tv/${encodeURIComponent(tmdbId)}/${encodeURIComponent(season)}/${encodeURIComponent(episode)}?${PLAYER_PARAMS}`;
          }

          return `https://vidsrc.su/movie/${encodeURIComponent(tmdbId)}?${PLAYER_PARAMS}`;
        }
      },
      {
        id: "vidsrcme",
        label: "VidSrcMe",
        url: ({ mediaType, tmdbId, season, episode }) => {
          const params = new URLSearchParams({ tmdb: tmdbId });

          if (mediaType === "tv") {
            params.set("season", season);
            params.set("episode", episode);
            return `https://vidsrcme.ru/embed/tv?${params.toString()}`;
          }

          return `https://vidsrcme.ru/embed/movie?${params.toString()}`;
        }
      },
      {
        id: "vidsrc-to",
        label: "VidSrc.to",
        url: ({ mediaType, tmdbId, imdbId, season, episode }) => {
          if (mediaType === "tv") {
            const showId = imdbId || tmdbId;
            return `https://vidsrc.to/embed/tv/${encodeURIComponent(showId)}/${encodeURIComponent(season)}/${encodeURIComponent(episode)}`;
          }

          return `https://vidsrc.to/embed/movie/${encodeURIComponent(tmdbId)}`;
        }
      }
    ];

    const searchForm = document.getElementById("searchForm");
    const searchInput = document.getElementById("searchInput");
    const searchButton = document.getElementById("searchButton");
    const movieGrid = document.getElementById("movieGrid");
    const sectionTitle = document.getElementById("sectionTitle");
    const homeView = document.getElementById("homeView");
    const playerView = document.getElementById("playerView");
    const player = document.getElementById("player");
    const playerTitle = document.getElementById("playerTitle");
    const playerMeta = document.getElementById("playerMeta");
    const playerSelector = document.getElementById("playerSelector");
    const homeLogo = document.getElementById("homeLogo");
    const backHome = document.getElementById("backHome");
    let currentPlayback = null;
    let activePlayerId = DEFAULT_PLAYER;

    function normalize(value) {
      return String(value || "")
        .toLowerCase()
        .normalize("NFD")
        .replace(/[\u0300-\u036f]/g, "")
        .replace(/[^a-z0-9\s]/g, " ")
        .replace(/\s+/g, " ")
        .trim();
    }

    function relevanceScore(item, query) {
      const title = normalize(item.name);
      const search = normalize(query);

      if (!search) {
        return 0;
      }

      if (title === search) {
        return 10000;
      }

      let score = 0;

      if (title.startsWith(search)) {
        score += 6500;
      }

      if (title.includes(search)) {
        score += 4200;
      }

      const titleWords = title.split(" ").filter(Boolean);
      const searchWords = search.split(" ").filter(Boolean);

      searchWords.forEach((word, index) => {
        if (titleWords[index] === word) {
          score += 700;
        }

        if (titleWords.includes(word)) {
          score += 380;
        }

        if (titleWords.some((titleWord) => titleWord.startsWith(word))) {
          score += 180;
        }
      });

      score -= Math.abs(title.length - search.length) * 2;
      return score;
    }

    function getPlayer(playerId) {
      return PLAYERS.find((playerOption) => playerOption.id === playerId) || PLAYERS[0];
    }

    function renderPlayerSelector() {
      playerSelector.innerHTML = "";

      PLAYERS.forEach((playerOption) => {
        const button = document.createElement("button");
        button.className = "player-option";
        button.type = "button";
        button.textContent = playerOption.label;
        button.dataset.playerId = playerOption.id;
        button.addEventListener("click", () => switchPlayer(playerOption.id));
        playerSelector.appendChild(button);
      });
    }

    function updatePlayerSelector() {
      const buttons = playerSelector.querySelectorAll(".player-option");

      buttons.forEach((button) => {
        const isActive = button.dataset.playerId === activePlayerId;
        button.classList.toggle("active", isActive);
        button.setAttribute("aria-pressed", String(isActive));
      });
    }

    function playerUrlForPlayback(playback, playerId = activePlayerId) {
      return getPlayer(playerId).url(playback);
    }

    function switchPlayer(playerId) {
      activePlayerId = getPlayer(playerId).id;
      updatePlayerSelector();

      const url = new URL(window.location.href);
      url.searchParams.set("p", activePlayerId);
      history.replaceState({ ...(history.state || {}), playerId: activePlayerId }, "", url);

      if (currentPlayback) {
        player.src = playerUrlForPlayback(currentPlayback);
      }
    }

    function renderCards(items) {
      movieGrid.innerHTML = "";

      if (!items.length) {
        const empty = document.createElement("p");
        empty.className = "tagline";
        empty.textContent = "No movies found.";
        movieGrid.appendChild(empty);
        return;
      }

      const fragment = document.createDocumentFragment();

      items.forEach((item) => {
        const card = document.createElement("button");
        card.className = "movie-card";
        card.type = "button";
        card.addEventListener("click", () => openPlayer(item.tmdb_id, item.name));

        const poster = item.cover_image ? document.createElement("img") : document.createElement("div");
        poster.className = item.cover_image ? "poster" : "poster poster-fallback";

        if (item.cover_image) {
          poster.src = item.cover_image;
          poster.alt = "";
          poster.loading = "lazy";
        } else {
          poster.textContent = (item.name || "?").trim().charAt(0).toUpperCase() || "?";
        }

        const body = document.createElement("div");
        const title = document.createElement("p");
        title.className = "movie-title";
        title.textContent = item.name || "Untitled";

        body.append(title);
        card.append(poster, body);
        fragment.appendChild(card);
      });

      movieGrid.appendChild(fragment);
    }

    function resetHomeContent() {
      searchInput.value = "";
      sectionTitle.textContent = "Recommended Movies";
      renderCards(recommendedMovies);
    }

    function showHome() {
      player.src = "";
      currentPlayback = null;
      playerView.classList.remove("show");
      homeView.classList.remove("hidden");
    }

    function showPlayer(tmdbId, title = "", options = {}) {
      const mediaType = options.mediaType === "tv" ? "tv" : "movie";
      const season = String(options.season || "1");
      const episode = String(options.episode || "1");
      const imdbId = options.imdbId || "";
      const chosenPlayer = getPlayer(options.playerId || activePlayerId);

      activePlayerId = chosenPlayer.id;
      currentPlayback = {
        tmdbId: String(tmdbId),
        title,
        mediaType,
        season,
        episode,
        imdbId
      };

      homeView.classList.add("hidden");
      playerView.classList.add("show");
      playerTitle.textContent = title || "Moviex Player";
      playerMeta.textContent = mediaType === "tv"
        ? `TMDB ${tmdbId} - S${season} E${episode}`
        : `TMDB ${tmdbId}`;
      updatePlayerSelector();
      player.src = playerUrlForPlayback(currentPlayback);
    }

    function openPlayer(tmdbId, title = "", options = {}) {
      const mediaType = options.mediaType === "tv" ? "tv" : "movie";
      const url = new URL(window.location.href);
      url.searchParams.set("w", tmdbId);
      url.searchParams.set("type", mediaType);
      url.searchParams.set("p", activePlayerId);
      url.searchParams.delete("s");
      url.searchParams.delete("imdb");
      url.searchParams.delete("season");
      url.searchParams.delete("episode");

      if (mediaType === "tv") {
        url.searchParams.set("season", options.season || "1");
        url.searchParams.set("episode", options.episode || "1");

        if (options.imdbId) {
          url.searchParams.set("imdb", options.imdbId);
        }
      }

      if (title) {
        url.searchParams.set("title", title);
      }
      history.pushState({ tmdbId, title, mediaType, playerId: activePlayerId }, "", url);
      showPlayer(tmdbId, title, { ...options, mediaType, playerId: activePlayerId });
    }

    async function searchMovies(query) {
      const cleanQuery = query.trim();

      if (!cleanQuery) {
        sectionTitle.textContent = "Recommended Movies";
        renderCards(recommendedMovies);
        return;
      }

      searchButton.disabled = true;
      sectionTitle.textContent = "Search Results";

      try {
        const response = await fetch(`${API_URL}${encodeURIComponent(cleanQuery)}`);

        if (!response.ok) {
          throw new Error(`Search failed with status ${response.status}`);
        }

        const data = await response.json();
        const results = Array.isArray(data.results) ? data.results : [];
        const sorted = results
          .filter((item) => item && item.type === "movie" && item.tmdb_id && item.name)
          .sort((a, b) => {
            const scoreDiff = relevanceScore(b, cleanQuery) - relevanceScore(a, cleanQuery);
            if (scoreDiff !== 0) {
              return scoreDiff;
            }
            return String(a.name).localeCompare(String(b.name));
          });

        renderCards(sorted);
      } catch (error) {
        renderCards([]);
        sectionTitle.textContent = error.message || "Search failed.";
      } finally {
        searchButton.disabled = false;
      }
    }

    function routeFromUrl() {
      const params = new URLSearchParams(window.location.search);
      const tmdbId = params.get("w");
      const searchTerm = params.get("s");
      const playerId = params.get("p") || DEFAULT_PLAYER;
      const mediaType = params.get("type") === "tv" ? "tv" : "movie";

      if (tmdbId) {
        showPlayer(tmdbId, params.get("title") || "", {
          mediaType,
          season: params.get("season") || "1",
          episode: params.get("episode") || "1",
          imdbId: params.get("imdb") || "",
          playerId
        });
        return;
      }

      showHome();

      if (searchTerm) {
        searchInput.value = searchTerm;
        searchMovies(searchTerm);
        return;
      }

      resetHomeContent();
    }

    searchForm.addEventListener("submit", (event) => {
      event.preventDefault();
      const cleanQuery = searchInput.value.trim();
      const url = new URL(window.location.href);
      url.searchParams.delete("w");
      url.searchParams.delete("title");
      url.searchParams.delete("type");
      url.searchParams.delete("season");
      url.searchParams.delete("episode");
      url.searchParams.delete("imdb");
      url.searchParams.delete("p");

      if (cleanQuery) {
        url.searchParams.set("s", cleanQuery);
      } else {
        url.searchParams.delete("s");
      }

      history.pushState({ search: cleanQuery }, "", url);
      searchMovies(cleanQuery);
    });

    function clearPlayerRoute() {
      const url = new URL(window.location.href);
      url.searchParams.delete("w");
      url.searchParams.delete("title");
      url.searchParams.delete("type");
      url.searchParams.delete("season");
      url.searchParams.delete("episode");
      url.searchParams.delete("imdb");
      url.searchParams.delete("p");
      url.searchParams.delete("s");
      url.searchParams.delete("q");
      history.pushState({}, "", url);
      routeFromUrl();
    }

    homeLogo.addEventListener("click", clearPlayerRoute);
    backHome.addEventListener("click", clearPlayerRoute);
    window.addEventListener("popstate", routeFromUrl);

    renderPlayerSelector();
    renderCards(recommendedMovies);
    routeFromUrl();
  </script>
  <script src="https://pl30223998.effectivecpmnetwork.com/1c/f0/b1/1cf0b121717da575cdab502d84704388.js"></script>
